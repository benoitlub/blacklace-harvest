<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Les récoltes produites par Blacklace Publisher.">
  <title>Blacklace Harvests</title>
  <style>
    :root{color-scheme:dark;--bg:#0d0d12;--panel:#181820;--line:#30303b;--text:#f6f2ec;--muted:#b8b3bd;--accent:#ff6542;--violet:#9e70ff}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 80% 0,#291b3e 0,transparent 35%),radial-gradient(circle at 0 30%,#302018 0,transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;padding:24px}.wrap{width:min(960px,100%);border:1px solid var(--line);border-radius:32px;background:rgba(24,24,32,.82);backdrop-filter:blur(16px);padding:clamp(32px,7vw,72px);box-shadow:0 40px 120px rgba(0,0,0,.35)}.eyebrow{color:var(--accent);font-weight:800;letter-spacing:.17em;text-transform:uppercase;font-size:.78rem}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent);margin-right:10px;box-shadow:0 0 18px var(--accent)}h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(3rem,9vw,7rem);line-height:.9;letter-spacing:-.055em;margin:24px 0}.lead{max-width:680px;color:var(--muted);font-size:clamp(1.05rem,2vw,1.35rem);line-height:1.65}.status{margin-top:36px;display:inline-flex;align-items:center;gap:12px;padding:12px 18px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.03);color:var(--muted)}.status b{color:var(--violet)}footer{margin-top:54px;color:var(--muted);font-size:.85rem}
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow"><span class="dot"></span>Blacklace Publisher</p>
    <h1>Les récoltes arrivent.</h1>
    <p class="lead">Ce dépôt accueille les landing pages préparées par Publisher. Chaque nouvelle récolte sera proposée dans une Pull Request avant publication.</p>
    <div class="status"><b>Niveau 1 actif</b><span>Révision humaine avant fusion</span></div>
    <footer>Blacklace Harvest · Feuch Institut</footer>
  </main>
</body>
</html>
